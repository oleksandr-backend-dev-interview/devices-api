services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: devices
      POSTGRES_USER: devices
      POSTGRES_PASSWORD: devices
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devices -d devices"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/devices
      DB_USERNAME: devices
      DB_PASSWORD: devices
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data: