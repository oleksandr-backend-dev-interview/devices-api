services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: devices
      POSTGRES_USER: devices
      POSTGRES_PASSWORD: devices
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devices -d devices"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data: